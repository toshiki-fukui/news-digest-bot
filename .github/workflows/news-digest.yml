name: News Digest

on:
  schedule:
    # JST 7:00 / 12:00 / 18:00 / 22:00 (UTC = JST-9)
    - cron: "0 22 * * *"
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send news digest
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python3 main.py

      - name: Commit updated history
        run: |
          git config user.name "news-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add sent_history.json
          git diff --cached --quiet || git commit -m "chore: update sent history"
          git push
